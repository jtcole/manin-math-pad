<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Manin Math Pad{% endblock %}</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f8;
      --panel: #ffffff;
      --ink: #17202a;
      --muted: #667085;
      --line: #d9dee5;
      --accent: #0f766e;
      --accent-strong: #0b5d56;
      --warn: #9a3412;
      --soft: #edf5f4;
      --assistant: #fff8e8;
      --user: #e8f1ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family:
        Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    button,
    input,
    textarea {
      font: inherit;
      letter-spacing: 0;
    }

    button {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      color: var(--ink);
      cursor: pointer;
    }

    button:hover {
      border-color: #aeb7c2;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.65;
    }

    a {
      color: var(--accent-strong);
    }

    {% block styles %}{% endblock %}
  </style>
</head>
<body>
  {% block body %}{% endblock %}
</body>
</html>
